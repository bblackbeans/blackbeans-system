<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ app_name }}</title>
</head>
<body style="margin:0;padding:24px;background:#f4f5f7;font-family:Arial,Helvetica,sans-serif;color:#323338;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0">
    <tr>
      <td align="center">
        <table role="presentation" width="560" cellspacing="0" cellpadding="0" style="background:#ffffff;border-radius:12px;overflow:hidden;">
          <tr>
            <td style="padding:24px 24px 8px;text-align:center;">
              <div style="font-size:22px;font-weight:700;color:#111;">{{ app_name }}</div>
            </td>
          </tr>
          <tr>
            <td style="padding:0 24px;"><hr style="border:none;border-top:1px solid #e6e9ef;" /></td>
          </tr>
          <tr>
            <td style="padding:24px;">
              <div style="font-size:14px;color:#676879;margin-bottom:12px;">{{ action_text }}</div>
              <div style="font-size:22px;font-weight:700;color:#111;margin-bottom:8px;">{{ task_title }}</div>
              {% if breadcrumb %}
              <div style="font-size:13px;color:#676879;margin-bottom:20px;">{{ breadcrumb }}</div>
              {% endif %}
              {% if message %}
              <div style="font-size:14px;color:#323338;margin-bottom:20px;">{{ message }}</div>
              {% endif %}
              <a href="{{ deep_link }}" style="display:inline-block;background:#ff6b00;color:#fff;text-decoration:none;padding:12px 20px;border-radius:8px;font-weight:600;">Ver tarefa</a>
            </td>
          </tr>
        </table>
        <div style="max-width:560px;margin:16px auto 0;font-size:12px;color:#676879;text-align:center;line-height:1.5;">
          Nao quer receber este tipo de e-mail?
          <a href="{{ unsubscribe_url }}" style="color:#676879;">Desativar</a>
          ou
          <a href="{{ preferences_url }}" style="color:#676879;">gerenciar preferencias</a>.
        </div>
      </td>
    </tr>
  </table>
</body>
</html>

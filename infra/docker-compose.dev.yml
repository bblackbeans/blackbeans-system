services:
  postgres:
    image: postgres:16
    container_name: blackbeans-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: blackbeans
      POSTGRES_USER: blackbeans
      POSTGRES_PASSWORD: blackbeans
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blackbeans -d blackbeans"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: blackbeans-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: infra/docker/api.Dockerfile
    container_name: blackbeans-api
    restart: unless-stopped
    env_file:
      - ./env/api.env.example
    volumes:
      - ../blackbeans-api:/app
      - /app/.venv
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "18000:8000"

  worker:
    build:
      context: ..
      dockerfile: infra/docker/worker.Dockerfile
    container_name: blackbeans-worker
    restart: unless-stopped
    env_file:
      - ./env/worker.env.example
    volumes:
      - ../blackbeans-api:/app
      - /app/.venv
    depends_on:
      api:
        condition: service_started
      redis:
        condition: service_healthy

  web:
    build:
      context: ..
      dockerfile: infra/docker/web.Dockerfile
    container_name: blackbeans-web
    restart: unless-stopped
    env_file:
      - ./env/web.env.example
    volumes:
      - ../blackbeans-web:/app
      - /app/node_modules
    depends_on:
      api:
        condition: service_started
    ports:
      - "13000:3000"

  proxy:
    image: nginx:1.27-alpine
    container_name: blackbeans-proxy
    restart: unless-stopped
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      web:
        condition: service_started
      api:
        condition: service_started
    ports:
      - "18080:80"

volumes:
  postgres_data:
